<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Offices Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#0b1020;
    color:#fff;
}

.global-office{
    display:flex;
    min-height:100vh;
}

.office-list{
    width:400px;
    padding:40px;
    background:#111827;
    overflow:auto;
}

.office-card{
    padding:20px;
    margin-bottom:15px;
    border-radius:15px;
    cursor:pointer;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.1);
    transition:.3s;
}

.office-card:hover,
.office-card.active{
    background:#2563eb;
}

.office-card h3{
    margin-bottom:10px;
}

.office-card p{
    font-size:14px;
    line-height:1.6;
}

#map{
    flex:1;
    height:100vh;
}

.leaflet-popup-content{
    font-size:14px;
}

@media(max-width:992px){

    .global-office{
        flex-direction:column;
    }

    .office-list{
        width:100%;
    }

    #map{
        height:600px;
    }
}
</style>
</head>
<body>

<div class="global-office">

    <div class="office-list">

        <div class="office-card active"
             data-lat="30.4425"
             data-lng="-97.7865"
             data-title="Head Office">
            <h3>HEAD OFFICE</h3>
            <p>
                13809 Research Boulevard,<br>
                Suite 500, Austin, TX 78750
            </p>
        </div>

        <div class="office-card"
             data-lat="43.3972"
             data-lng="-79.7990"
             data-title="Toronto Office">
            <h3>TORONTO OFFICE</h3>
            <p>
                2080 Deer Run Ave,<br>
                Burlington ON L7M 2S8, Canada
            </p>
        </div>

        <div class="office-card"
             data-lat="28.6276"
             data-lng="77.3803"
             data-title="Offshore Delivery Center">
            <h3>OFFSHORE DELIVERY CENTER</h3>
            <p>
                Suite No. G-02, H-221 Infinity Business Park,<br>
                Sector 63, Noida, Uttar Pradesh 201301
            </p>
        </div>

    </div>

    <div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const map = L.map('map',{
    worldCopyJump:true
}).setView([20,0],2);

L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {
        attribution:'© OpenStreetMap'
    }
).addTo(map);

const offices = [
{
    title:'Head Office',
    lat:30.4425,
    lng:-97.7865,
    address:'Austin, Texas, USA'
},
{
    title:'Toronto Office',
    lat:43.3972,
    lng:-79.7990,
    address:'Burlington, Ontario, Canada'
},
{
    title:'Offshore Delivery Center',
    lat:28.6276,
    lng:77.3803,
    address:'Noida, Uttar Pradesh, India'
}
];

const markers = [];

offices.forEach(office=>{

    const marker = L.marker([
        office.lat,
        office.lng
    ])
    .addTo(map)
    .bindPopup(`
        <strong>${office.title}</strong><br>
        ${office.address}
    `);

    markers.push(marker);
});

document
.querySelectorAll('.office-card')
.forEach(card=>{

    card.addEventListener('click',()=>{

        document
        .querySelectorAll('.office-card')
        .forEach(item=>{
            item.classList.remove('active');
        });

        card.classList.add('active');

        const lat = parseFloat(card.dataset.lat);
        const lng = parseFloat(card.dataset.lng);

        map.flyTo(
            [lat,lng],
            6,
            {
                duration:2
            }
        );

        markers.forEach(marker=>{

            const pos = marker.getLatLng();

            if(
                pos.lat === lat &&
                pos.lng === lng
            ){
                marker.openPopup();
            }

        });

    });

});

</script>

</body>
</html>
